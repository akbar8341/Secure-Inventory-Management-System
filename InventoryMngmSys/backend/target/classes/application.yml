server:
  port: 8080

spring:
  application:
    name: inventory-management
  
  datasource:
    url: jdbc:mysql://localhost:3306/inventory_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: Akbar123
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# JWT Configuration
jwt:
  secret: YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong!
  expiration: 86400000  # 24 hours in milliseconds

# Application Configuration
app:
  cors:
    allowed-origins: http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# Logging
logging:
  level:
    com.inventory: INFO
    org.springframework.security: INFO
